name: CI

# Se ejecuta en cada push y en cada pull request hacia main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Check + Tests
    runs-on: ubuntu-latest

    steps:
      # 1) Descarga el código del repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2) Prepara Python (misma versión que en desarrollo)
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      # 3) Instala las dependencias (incluye las de desarrollo/testing)
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      # 4) Lint: estilo y errores comunes
      - name: Lint (ruff)
        run: ruff check .

      # 5) Verifica la configuración del proyecto
      - name: Django check
        run: python manage.py check

      # 5) Valida que el esquema OpenAPI se genere sin errores
      - name: Validar esquema OpenAPI
        run: python manage.py spectacular --file /tmp/schema.yml --validate

      # 6) Corre la suite de tests midiendo cobertura
      - name: Tests + cobertura
        run: |
          coverage run manage.py test --verbosity 2
          coverage report
